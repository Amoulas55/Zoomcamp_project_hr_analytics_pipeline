volumes:
  postgres-data:
  kestra-data:

services:
  # ── Kestra backend database ──────────────────────────
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kestra orchestrator ──────────────────────────────
  kestra:
    image: kestra/kestra:latest-full
    command: server local
    restart: unless-stopped
    user: "root"
    ports:
      - "8080:8080"
    environment:
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_BUCKET_NAME: ${GCP_BUCKET_NAME}
      KESTRA_GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      KESTRA_GCP_BUCKET_NAME: ${GCP_BUCKET_NAME}
      KESTRA_CONFIGURATION: |
        kestra:
          variables:
            env-vars-prefix: KESTRA_
          repository:
            type: postgres
          storage:
            type: local
            local:
              base-path: /app/storage
          datasources:
            postgres:
              url: jdbc:postgresql://postgres:5432/kestra
              driverClassName: org.postgresql.Driver
              username: kestra
              password: kestra
    volumes:
      # Mount the entire project so Kestra can access data/ and dbt/
      - ./:/pipeline
      - /var/run/docker.sock:/var/run/docker.sock
      - kestra-data:/app/storage
    depends_on:
      postgres:
        condition: service_healthy

  # ── Streamlit BI Dashboard ──────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      BQ_DATASET: ${BQ_DATASET:-hr_analytics_dataset}
      GOOGLE_APPLICATION_CREDENTIALS: /app/google_credentials.json
    volumes:
      - ./google_credentials.json:/app/google_credentials.json:ro
